<svg width="256" height="256" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1a3a4a"/>
  
  <!-- Leaf shape - elongated teardrop, pointed at top, rounded at bottom -->
  <!-- Left half -->
  <path d="M32 6 C 32 6, 14 28, 14 42 C 14 52, 22 58, 32 58 Z" fill="#2ecc71"/>
  <!-- Right half (slightly darker) -->
  <path d="M32 6 C 32 6, 50 28, 50 42 C 50 52, 42 58, 32 58 Z" fill="#27ae60"/>
  
  <!-- Center stem -->
  <line x1="32" y1="14" x2="32" y2="58" stroke="#1a8a4a" stroke-width="1.8" stroke-linecap="round"/>
  
  <!-- Left veins - curving outward and upward -->
  <path d="M32 24 Q 26 22, 19 25" stroke="#1a8a4a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M32 32 Q 25 29, 17 33" stroke="#1a8a4a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M32 40 Q 26 37, 18 41" stroke="#1a8a4a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M32 48 Q 27 46, 21 49" stroke="#1a8a4a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  
  <!-- Right veins - curving outward and upward -->
  <path d="M32 24 Q 38 22, 45 25" stroke="#1a8a4a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M32 32 Q 39 29, 47 33" stroke="#1a8a4a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M32 40 Q 38 37, 46 41" stroke="#1a8a4a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M32 48 Q 37 46, 43 49" stroke="#1a8a4a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
</svg>
